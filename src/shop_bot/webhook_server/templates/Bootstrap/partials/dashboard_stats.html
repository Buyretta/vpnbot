<div class="col-sm-6 col-xl-3">
    <div class="card h-100">
        <div class="card-body py-3">
            <div class="d-flex align-items-center justify-content-between gap-3">
                <div>
                    <div class="text-muted small">Пользователей</div>
                    <div class="fs-4 fw-semibold">{{ stats.user_count }}</div>
                </div>
                <span class="rounded-circle bg-light d-inline-flex align-items-center justify-content-center p-2">
                    <i class="fa-solid fa-users text-secondary"></i>
                </span>
            </div>
        </div>
    </div>
</div>
<div class="col-sm-6 col-xl-3">
    <div class="card h-100">
        <div class="card-body py-3">
            <div class="d-flex align-items-center justify-content-between gap-3">
                <div>
                    <div class="text-muted small">Всего ключей</div>
                    <div class="fs-4 fw-semibold">{{ stats.total_keys }}</div>
                </div>
                <span class="rounded-circle bg-light d-inline-flex align-items-center justify-content-center p-2">
                    <i class="fa-solid fa-key text-secondary"></i>
                </span>
            </div>
        </div>
    </div>
</div>
<div class="col-sm-6 col-xl-3">
    <div class="card h-100">
        <div class="card-body py-3">
            <div class="d-flex align-items-center justify-content-between gap-3">
                <div>
                    <div class="text-muted small">Потрачено</div>
                    <div class="fs-4 fw-semibold">{{ stats.total_spent | round(1) }} <small class="text-muted fs-6">₽</small></div>
                </div>
                <span class="rounded-circle bg-light d-inline-flex align-items-center justify-content-center p-2">
                    <i class="fa-solid fa-wallet text-secondary"></i>
                </span>
            </div>
        </div>
    </div>
</div>
<div class="col-sm-6 col-xl-3">
    <div class="card h-100">
        <div class="card-body py-3">
            <div class="d-flex align-items-center justify-content-between gap-3">
                <div>
                    <div class="text-muted small">Хостов</div>
                    <div class="fs-4 fw-semibold">{{ stats.host_count }}</div>
                    <div class="small text-muted">{{ open_tickets_count }} тикетов</div>
                </div>
                <span class="rounded-circle bg-light d-inline-flex align-items-center justify-content-center p-2">
                    <i class="fa-solid fa-server text-secondary"></i>
                </span>
            </div>
        </div>
    </div>
</div>
