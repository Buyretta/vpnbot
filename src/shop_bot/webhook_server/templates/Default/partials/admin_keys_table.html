{% for k in keys %}
<tr>
  <td class="small"><span class="text-muted">#{{ k.key_id }}</span></td>
  <td class="small">{{ k.user_id or '-' }}</td>
  <td class="small"><span class="badge bg-azure-lt">{{ k.host_name }}</span></td>
  <td class="small text-truncate" style="max-width:160px" title="{{ k.key_email }}">{{ k.key_email }}</td>
  <td class="small">{{ k.expiry_date or '—' }}</td>
  <td class="text-center">
    <div class="btn-list justify-content-center">
      <button type="button" class="btn btn-sm btn-outline-secondary btn-glass" data-action="edit-comment" data-key-id="{{ k.key_id }}" data-comment="{{ (k.comment or '')|e }}" title="Заметка" data-bs-toggle="tooltip">
        <i class="ti ti-message"></i>
      </button>
      <button type="button" class="btn btn-sm btn-outline-warning btn-glass" data-action="edit-expiry" data-key-id="{{ k.key_id }}" data-expiry="{{ k.expiry_date or '' }}" title="Продлить" data-bs-toggle="tooltip">
        <i class="ti ti-calendar-stats"></i>
      </button>
      <form action="{{ url_for('delete_key_route', key_id=k.key_id) }}" method="post" data-confirm="Удалить ключ #{{ k.key_id }}?" class="d-inline">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <button type="submit" class="btn btn-sm btn-outline-danger btn-glass" title="Удалить" data-bs-toggle="tooltip">
          <i class="ti ti-trash"></i>
        </button>
      </form>
    </div>
  </td>
</tr>
{% endfor %}
