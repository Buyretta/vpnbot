<div class="col-sm-6 col-lg-3">
  <div class="card card-sm">
    <div class="card-body">
      <div class="row align-items-center">
        <div class="col-auto">
          <span class="bg-primary-lt avatar">
            <i class="ti ti-users fs-2"></i>
          </span>
        </div>
        <div class="col">
          <div class="font-weight-bold h1 mb-0">
            {{ stats.user_count }}
          </div>
          <div class="text-muted small text-uppercase fw-bold">
            Пользователей
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="col-sm-6 col-lg-3">
  <div class="card card-sm">
    <div class="card-body">
      <div class="row align-items-center">
        <div class="col-auto">
          <span class="bg-green-lt avatar">
            <i class="ti ti-key fs-2"></i>
          </span>
        </div>
        <div class="col">
          <div class="font-weight-bold h1 mb-0">
            {{ stats.total_keys }}
          </div>
          <div class="text-muted small text-uppercase fw-bold">
            Всего ключей
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="col-sm-6 col-lg-3">
  <div class="card card-sm">
    <div class="card-body">
      <div class="row align-items-center">
        <div class="col-auto">
          <span class="bg-orange-lt avatar">
            <i class="ti ti-wallet fs-2"></i>
          </span>
        </div>
        <div class="col">
          <div class="font-weight-bold h1 mb-0">
            {{ stats.total_spent | round(1) }} <small class="fs-4 fw-normal">₽</small>
          </div>
          <div class="text-muted small text-uppercase fw-bold">
            Потрачено
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="col-sm-6 col-lg-3">
  <div class="card card-sm">
    <div class="card-body">
      <div class="row align-items-center">
        <div class="col-auto">
          <span class="bg-azure-lt avatar">
            <i class="ti ti-server fs-2"></i>
          </span>
        </div>
        <div class="col">
          <div class="font-weight-bold h1 mb-0">
            {{ stats.host_count }}
          </div>
          <div class="text-muted small text-uppercase fw-bold">
            {{ open_tickets_count }} тикетов
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
